<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI PDF Layout Fixer (Prototype)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 20px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.box {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

canvas, img {
  width: 100%;
  border-radius: 8px;
  background: #fff;
}

button {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
}

pre {
  white-space: pre-wrap;
  background: #000;
  padding: 10px;
  height: 200px;
  overflow: auto;
}
</style>
</head>

<body>

<h2>AI PDF Layout Fixer (Prototype)</h2>

<div class="container">

  <!-- LEFT: Reference Image -->
  <div class="box">
    <h3>Reference Image (Correct Design)</h3>
    <input type="file" id="imgUpload" accept="image/*">
    <img id="imgPreview" />
    <button onclick="scanImage()">Scan Reference Layout</button>
    <pre id="ocrOutput"></pre>
  </div>

  <!-- RIGHT: PDF -->
  <div class="box">
    <h3>PDF File (Needs Fixing)</h3>
    <input type="file" id="pdfUpload" accept="application/pdf">
    <canvas id="pdfCanvas"></canvas>

    <button onclick="analyzePDF()">Analyze PDF Layout</button>
    <button onclick="autoFixLayout()">Auto Fix Layout (AI Simulated)</button>

    <pre id="pdfOutput"></pre>
  </div>

</div>

<script>
let pdfDoc = null;
let pdfTextData = [];
let referenceText = "";

/* =========================
   IMAGE PREVIEW + OCR
========================= */
document.getElementById("imgUpload").onchange = function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    document.getElementById("imgPreview").src = event.target.result;
  };

  reader.readAsDataURL(file);
};

function scanImage() {
  const img = document.getElementById("imgPreview");

  Tesseract.recognize(img.src, 'eng')
    .then(({ data }) => {
      referenceText = data.text;
      document.getElementById("ocrOutput").textContent =
        "REFERENCE OCR TEXT:\n\n" + referenceText;
    });
}

/* =========================
   PDF LOADING
========================= */
document.getElementById("pdfUpload").onchange = function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    const typedarray = new Uint8Array(this.result);

    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
      pdfDoc = pdf;
      renderPage(1);
    });
  };

  reader.readAsArrayBuffer(file);
};

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const canvas = document.getElementById("pdfCanvas");
    const ctx = canvas.getContext("2d");

    const viewport = page.getViewport({ scale: 1.5 });
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    });

    page.getTextContent().then(text => {
      pdfTextData = text.items.map(i => i.str);
    });
  });
}

/* =========================
   PDF ANALYSIS
========================= */
function analyzePDF() {
  document.getElementById("pdfOutput").textContent =
    "PDF TEXT EXTRACTED:\n\n" + pdfTextData.join(" ");
}

/* =========================
   AI-LIKE LAYOUT FIX (SIMULATED)
========================= */
function autoFixLayout() {
  let refWords = referenceText.split(" ");
  let pdfWords = pdfTextData;

  let missing = refWords.filter(w => !pdfWords.includes(w));

  let result =
`AI LAYOUT MATCH REPORT

MATCHED ELEMENTS:
${pdfWords.join(" ")}

MISSING ELEMENTS (needs reposition/reinsert):
${missing.join(" ")}

NOTE:
This prototype does NOT yet realign vectors or fonts.
A backend AI engine is required for full layout reconstruction.
`;

  document.getElementById("pdfOutput").textContent = result;
}
</script>

</body>
</html>
